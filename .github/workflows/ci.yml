name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev extras
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest

      - name: Build sdist + wheel
        run: python -m build

      - name: Codex smoke
        if: matrix.python-version == '3.12'
        run: |
          python scripts/smoke_codex.py
          python scripts/smoke_workbench_v2.py

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - run: npm ci
      - run: npm test -- --run
      - run: npm run typecheck
      - run: npm run build

  desktop-bundle:
    name: desktop bundle smoke
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install Python package and dev extras
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Python sidecars
        run: python scripts/build_sidecar.py

      - name: Rust checks
        working-directory: apps/desktop/src-tauri
        run: |
          cargo fmt --check
          cargo test
          cargo clippy --all-targets -- -D warnings
          cargo check

      - name: Build desktop bundles
        working-directory: apps/desktop
        run: npm run tauri -- build --bundles deb,appimage

      - name: Release manifest and smoke
        run: |
          python scripts/release_manifest.py
          python scripts/smoke_desktop_bundle.py

      - uses: actions/upload-artifact@v4
        with:
          name: hardware-workbench-linux-artifacts
          path: |
            dist/release/**
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
